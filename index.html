<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gulf Bottom Intel — Tampa Bay → Hudson Offshore</title>
<link rel="stylesheet" href="libs/leaflet.css">
<link rel="stylesheet" href="css/style.css?v=24">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🎣</text></svg>">
</head>
<body>
<header>
  <h1>🎣 Gulf Bottom Intel<span class="sub">Tampa Bay → Hudson · 20–80 mi · snapper &amp; grouper</span></h1>
  <div class="ctl"><label>Date</label><input type="date" id="dateInp"></div>
  <div class="ctl"><label>Launch</label><select id="launchSel"></select></div>
  <div class="ctl"><label>Max seas</label><input type="number" id="seasInp" min="1" max="8" step="0.5"> <span class="muted small">ft</span></div>
  <div id="speciesChips"></div>
  <div class="spacer"></div>
  <button id="refreshBtn" title="Clear cached forecasts and refetch">↻ Refresh</button>
</header>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="tabs">
      <button data-tab="today" class="on">Today</button>
      <button data-tab="trip">Trip</button>
      <button data-tab="spots">Spots</button>
      <button data-tab="seasons">Seasons</button>
      <button data-tab="intel">Intel</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<div id="toast"></div>

<script src="libs/leaflet.js"></script>
<script src="libs/leaflet-heat.js"></script>
<script src="libs/suncalc.js"></script>
<script src="data/core.js?v=24"></script>
<script src="data/regs.js?v=24"></script>
<script src="data/science.js?v=24"></script>
<script src="data/spots.js?v=24"></script>
<script src="data/zones.js?v=24"></script>
<script src="data/reports.js?v=24"></script>
<script src="js/astro.js?v=24"></script>
<script src="js/conditions.js?v=24"></script>
<script src="js/scoring.js?v=24"></script>
<script src="js/export.js?v=24"></script>
<script src="js/userspots.js?v=24"></script>
<script src="js/charts.js?v=24"></script>
<script src="js/trip.js?v=24"></script>
<script src="js/app.js?v=24"></script>
</body>
</html>
