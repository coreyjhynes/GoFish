<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gulf Bottom Intel — Tampa Bay → Hudson Offshore</title>
<link rel="stylesheet" href="libs/leaflet.css">
<link rel="stylesheet" href="css/style.css?v=40">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1722">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
</head>
<body>
<header>
  <h1>🎣 Gulf Bottom Intel<span class="sub">Tampa Bay → Hudson · Venice LA · Florida Keys</span></h1>
  <div class="ctl"><label>Region</label><select id="regionSel"></select></div>
  <div class="ctl"><label>Date</label><input type="date" id="dateInp"></div>
  <button id="gearBtn" title="Launch, seas limit, refresh">⚙</button>
  <div id="advCtl">
    <div class="ctl"><label>Launch</label><select id="launchSel"></select></div>
    <div class="ctl"><label>Max seas</label><input type="number" id="seasInp" min="1" max="8" step="0.5"> <span class="muted small">ft</span></div>
    <button id="refreshBtn" title="Clear cached forecasts and refetch">↻ Refresh</button>
  </div>
  <div id="speciesChips"></div>
  <div class="spacer"></div>
</header>

<div id="main">
  <div id="map"></div>
  <div id="fabs"><button id="locateBtn" title="My position — distances from me">📍</button></div>
  <div id="sidebar">
    <div id="sheetHandle"><span></span></div>
    <div id="tabs">
      <button data-tab="today" class="on">Today</button>
      <button data-tab="trip">Trip</button>
      <button data-tab="spots">Spots</button>
      <button data-tab="seasons">Seasons</button>
      <button data-tab="intel">Intel</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<div id="toast"></div>

<script src="libs/leaflet.js"></script>
<script src="libs/leaflet-heat.js"></script>
<script src="libs/suncalc.js"></script>
<script src="data/core.js?v=40"></script>
<script src="data/regs.js?v=40"></script>
<script src="data/science.js?v=40"></script>
<script src="data/spots.js?v=40"></script>
<script src="data/zones.js?v=40"></script>
<script src="data/reports.js?v=40"></script>
<script src="data/venice.js?v=40"></script>
<script src="data/rigs_venice.js?v=40"></script>
<script src="data/keys.js?v=40"></script>
<script src="data/bathy_refined.js?v=40"></script>
<script src="data/depth_tampa.js?v=40"></script>
<script src="data/reefs_tampa.js?v=40"></script>
<script src="data/ledges_tampa.js?v=40"></script>
<script src="data/csb_anomalies_tampa.js?v=40"></script>
<script src="js/astro.js?v=40"></script>
<script src="js/conditions.js?v=40"></script>
<script src="js/scoring.js?v=40"></script>
<script src="js/export.js?v=40"></script>
<script src="js/userspots.js?v=40"></script>
<script src="js/charts.js?v=40"></script>
<script src="js/trip.js?v=40"></script>
<script src="js/app.js?v=40"></script>
<script>
if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
  navigator.serviceWorker.register("sw.js").catch(function () {});
}
</script>
</body>
</html>
